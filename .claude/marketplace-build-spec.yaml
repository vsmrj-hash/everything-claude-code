# Marketplace: WellRead — Health & Wellness Ebook Marketplace

marketplace:
  name: "WellRead"
  slug: "wellread-market"
  tagline: "Science-backed guidance for your body, your life."
  category: digital-goods
  audience:
    buyers: "Adults 35–65 navigating GLP-1/Ozempic transitions, perimenopause symptoms, caregiver burnout, and family digital safety — searching for practical, evidence-based ebooks they can apply immediately"
    sellers: "Independent authors, health coaches, nutritionists, and researchers publishing niche wellness guides"
  listings:
    - "GLP-1 / weight-loss medication guides (tapering, nutrition, side-effects)"
    - "Perimenopause & menopause management ebooks"
    - "Caregiver support and sandwich-generation toolkits"
    - "Family digital safety and AI-literacy guides"
    - "Budget-wellness and financial resilience blueprints"
    - "Microplastics detox and home safety guides"
  features:
    - search
    - auth
    - listings-crud
    - instant-download
    - stripe-checkout
    - ratings-and-reviews
    - seller-dashboard
    - category-filter
    - featured-listings
    - reading-preview

  design:
    tone: minimal
    primary_color: "#2D6A4F"       # calm forest green — trust, health, growth
    secondary_color: "#95D5B2"     # soft mint — warmth, approachability
    accent_color: "#1B4332"        # deep green — authority, depth
    background: "#FAFAF8"          # warm off-white — easy on eyes, editorial
    surface: "#FFFFFF"
    font_heading: "Fraunces"       # editorial serif — warmth + trust
    font_body: "Inter"             # clean, readable at all sizes
    components:
      - hero
      - listing-card
      - category-strip
      - filter-sidebar
      - product-detail
      - reading-preview-modal
      - checkout-form
      - download-portal
      - seller-dashboard
      - review-block

  tech_stack:
    framework: "next"              # Next.js 14 App Router
    styling: "tailwind"            # Tailwind CSS + shadcn/ui
    auth: "clerk"
    database: "supabase"
    orm: "drizzle"
    payments: "stripe"
    file_storage: "supabase-storage"
    deployment: "vercel"

  vercel:
    scope: "vsmrj-hashs-projects"
    team_id: "team_ogEoLQvS3UP9AWEtv6OatFGk"
    project_name: "wellread-market"
    environment_vars:
      - NEXT_PUBLIC_SITE_NAME
      - NEXT_PUBLIC_BASE_URL
